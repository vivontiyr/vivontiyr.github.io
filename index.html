<!DOCTYPE html>
<html>
<head>
    <title>как я заебалась</title>
</head>
<script>
  // Функция, которая сработает при движении мыши
  function redirectOnMove() {
    // Убираем обработчик после первого срабатывания, чтобы не пытаться перенаправить много раз подряд
    document.removeEventListener('mousemove', redirectOnMove);
    document.removeEventListener('click', redirectOnMove);
    // Перенаправляем пользователя
    window.location.href = 'https://youtu.be/dQw4w9WgXcQ?si=_cU9UpdlwZgTI-Pz';
  }

  // Вешаем обработчики на движение мыши и на клик
  document.addEventListener('mousemove', redirectOnMove);
  document.addEventListener('click', redirectOnMove);
</script>
